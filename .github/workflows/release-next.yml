name: Release (pre-release)

on:
  push:
    branches: [dev]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          prerelease: true
          prerelease-type: beta
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
