name: Publish to npm

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - run: npm publish --provenance
